{% extends 'base.html' %}
{% load static %}

{% block header %}
  <script src="{% static 'js/bootstrap-4.0.0-dist/js/yandex.js' %}" type="text/javascript"></script>
  <link rel="stylesheet" type="text/css" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
  <!-- Создаём карту -->
  <script type="text/javascript">
      // Функция ymaps.ready() будет вызвана, когда
      // загрузятся все компоненты API, а также когда будет готово DOM-дерево.
      ymaps.ready(init);
  
      function init() {
          // Создание карты.
          // https://tech.yandex.ru/maps/doc/jsapi/2.1/dg/concepts/map-docpage/
          var myMap = new ymaps.Map("map", {
              // Координаты центра карты.
              // Порядок по умолчнию: «широта, долгота».
              center: [55.700000, 37.400000],
              // Уровень масштабирования. Допустимые значения:
              // от 0 (весь мир) до 19.
              zoom: 10,
              // Элементы управления
              // https://tech.yandex.ru/maps/doc/jsapi/2.1/dg/concepts/controls/standard-docpage/
              controls: [
                  'zoomControl', // Ползунок масштаба
                  // 'rulerControl', // Линейка
                  // 'routeButtonControl', // Панель маршрутизации
                  // 'trafficControl', // Пробки
                  'typeSelector', // Переключатель слоев карты
                  'fullscreenControl', // Полноэкранный режим
  
                  // Поисковая строка
                  // new ymaps.control.SearchControl({
                  //     options: {
                  //         // вид - поисковая строка
                  //         size: 'large',
                  //         // Включим возможность искать не только топонимы, но и организации.
                  //         provider: 'yandex#search'
                  //     }
                  // }) 
              ]
          });
          myMap.behaviors.disable('scrollZoom'); // — это отключает зум колёсиком мышки, всё ок.
          // Добавление метки
          // https://tech.yandex.ru/maps/doc/jsapi/2.1/ref/reference/Placemark-docpage/
          var krylatskoePlacemark = new ymaps.Placemark([55.733173, 37.427327], {
              // Хинт показывается при наведении мышкой на иконку метки.
              hintContent: '"Кунцевская"',
              // Балун откроется при клике по метке.
              balloonContent: 'ул. Молодогвардейская, 15'
          });
  
          // После того как метка была создана, добавляем её на карту.
          myMap.geoObjects.add(krylatskoePlacemark);

          var rasskazovkaPlacemark = new ymaps.Placemark([55.631799, 37.368141], {
              // Хинт показывается при наведении мышкой на иконку метки.
              hintContent: '"Новопеределкино"',
              // Балун откроется при клике по метке.
              balloonContent: 'ул. Новоорловская, 7В'
          });
  
          // После того как метка была создана, добавляем её на карту.
          myMap.geoObjects.add(rasskazovkaPlacemark);
  
      }
  </script>
{% endblock header %} 

{% block style %}
  body {
    background: white;
  }
{% endblock style %}

{% block intro %}
{% endblock intro %}

{% block content %}
  <h5 class="title">{{ Title }}</h5>

  <!-- Создаём контейнер для карты -->
  <div class="my-5" id="map" style="width: 100%; height: 480px"></div>
{% endblock content %}

{% block prefooter %}
{% endblock prefooter %}
